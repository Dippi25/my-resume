<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apurva Upadhyay | Art Director</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #4ade80;
            --glass: rgba(255, 255, 255, 0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        h1, h2, .huge-text { font-family: 'Syne', sans-serif; text-transform: uppercase; }

        /* Horizontal Scroll Wrapper */
        .container {
            display: flex;
            width: 400vw; /* 4 sections wide */
            height: 100vh;
            transition: transform 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        section {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            padding: 0 8%;
            position: relative;
            flex-shrink: 0;
        }

        /* Interactive Navigation */
        nav {
            position: fixed;
            top: 0; width: 100%;
            padding: 30px 8%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
        }

        .nav-links button {
            background: none; border: 1px solid var(--accent);
            color: var(--accent); padding: 10px 20px;
            cursor: pointer; font-weight: 600; border-radius: 50px;
            transition: 0.3s;
        }

        .nav-links button:hover { background: var(--accent); color: #000; }

        /* Section 1: Hero */
        .hero-content h1 { font-size: clamp(3rem, 8vw, 6rem); line-height: 0.9; }
        .hero-content p { color: var(--accent); font-size: 1.2rem; margin-top: 20px; letter-spacing: 4px; }
        .scroll-hint { position: absolute; bottom: 40px; font-size: 0.8rem; opacity: 0.5; }

        /* Section 2: Experience Glass Cards */
        .exp-grid { display: flex; gap: 30px; }
        .card {
            background: var(--glass);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            width: 400px;
            border: 1px solid rgba(255,255,255,0.1);
            transition: 0.4s;
        }
        .card:hover { transform: translateY(-20px); border-color: var(--accent); }
        .card h3 { color: var(--accent); margin-bottom: 10px; }

        /* Section 3: Skills / AI Mastery */
        .skills-list { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; }
        .skill-item { font-size: 2rem; font-weight: 800; opacity: 0.3; transition: 0.3s; cursor: crosshair; }
        .skill-item:hover { opacity: 1; color: var(--accent); transform: skewX(-10deg); }

        /* Section 4: Clients */
        .client-wrap { display: flex; flex-wrap: wrap; gap: 40px; max-width: 800px; }
        .client-box { font-size: 1.5rem; border-bottom: 2px solid #333; padding: 10px; transition: 0.3s; }
        .client-box:hover { border-color: var(--accent); color: var(--accent); }

        /* Layout Controls (The "Interactive" part) */
        .controls {
            position: fixed; bottom: 40px; right: 8%; display: flex; gap: 20px; z-index: 1000;
        }
        .control-btn {
            width: 50px; height: 50px; border-radius: 50%; border: 1px solid #fff;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: 0.3s;
        }
        .control-btn:hover { background: #fff; color: #000; }

    </style>
</head>
<body>

    <nav>
        <div style="font-weight: 800; font-size: 1.5rem;">APURVA.</div>
        <div class="nav-links">
            <button onclick="window.print()">GENERATE PDF</button>
        </div>
    </nav>

    <div class="container" id="mainSlider">
